<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動卡片 Vue 元件</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 1. 根據 規範-元件區.JSON 定義 CSS 設計變數 */
        :root {
            /* Color Palette */
            --color-orange-500: #FC8458;
            --color-blue-500: #16B4D6;
            --color-white-base: #FDFDFD;
            --color-font-black: #2C3E50;

            /* Typography */
            --font-family-sans: 'Noto Sans TC', 'Gen Jyuu Gothic X', sans-serif;
            --font-size-h3: 30px;
            --font-size-p: 22px;
            --font-weight-bold: 700;
            --font-weight-normal: 400;
        }

        body {
            font-family: var(--font-family-sans);
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* 2. 活動卡片主體樣式 (ActivityCard) */
        .activity-card {
            width: 447px;
            height: 658px;
            border-radius: 80px;
            background-color: var(--color-white-base);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .activity-card .card-img-top {
            width: 100%;
            height: 333px;
            object-fit: cover;
        }

        .activity-card .card-body {
            padding: 44px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .activity-card .card-category {
            margin-bottom: 32px;
        }

        .activity-card .card-title {
            font-size: var(--font-size-h3);
            font-weight: var(--font-weight-bold);
            color: var(--color-font-black);
            line-height: 1.4;
            text-decoration: none;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: auto;
        }

        .activity-card .card-title:hover {
            color: inherit;
            opacity: 0.8;
        }

        .activity-card .learn-more {
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-bold);
            color: var(--color-blue-500);
            text-decoration: none;
            display: flex;
            align-items: center;
            align-self: flex-end;
            margin-top: 24px;
        }

        .activity-card .learn-more .icon {
            width: 42px;
            height: 42px;
            margin-left: 12px;
        }

        /* 3. 活動卡片分類元件樣式 (CategoryButton) */
        .category-button {
            background-color: var(--color-orange-500);
            color: var(--color-white-base);
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-normal);
            padding: 8px 18px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        .category-button:hover {
            opacity: 0.9;
            color: var(--color-white-base);
        }
    </style>
</head>

<body>
    <div id="app">
        <activity-card :card-data="cardInfo"></activity-card>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const app = Vue.createApp({
            data() {
                return {
                    cardInfo: {
                        imageUrl: 'https://ljh.taichung.gov.tw/media/1270774/%E4%B8%BB%E8%A6%96%E8%A6%BA%E5%AE%A3%E5%82%B3%E6%B5%B7%E5%A0%B1-%E7%A2%BA%E8%AA%8D%E7%89%88.jpg',
                        category: { text: '技藝 / 興趣培養', url: '#' },
                        title: { text: '活動名稱 打工陷阱別亂闖，手機代刷付款父母賠到哭出來...', url: '#' },
                        moreUrl: '#'
                    }
                }
            }
        });

        // 元件 1: CategoryButton
        app.component('category-button', {
            props: {
                text: { type: String, required: true },
                href: { type: String, default: '#' }
            },
            template: `<a :href="href" class="category-button">{{ text }}</a>`
        });

        // --- 修改/新增開始 ---
        // 元件 2: ActivityCard (主要活動卡片)
        app.component('activity-card', {
            props: {
                cardData: { type: Object, required: true }
            },
            // 經過簡化，我們不再需要 created() 生命週期掛鉤
            template: `
                <div class="activity-card">
                    <img :src="cardData.imageUrl" class="card-img-top" alt="活動圖片">
                    <div class="card-body">
                        <div class="card-category">
                            <category-button :text="cardData.category.text" :href="cardData.category.url"></category-button>
                        </div>
                        <a :href="cardData.title.url" class="card-title h3">
                            {{ cardData.title.text }}
                        </a>
                        <a :href="cardData.moreUrl" class="learn-more">
                            <p class="mb-0">了解更多</p>
                            <svg class="icon" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="21" cy="21" r="20" fill="var(--color-white-base)" stroke="currentColor" stroke-width="2"/>
                                <path d="M17.5 13.125L26.25 21L17.5 28.875" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </a>
                    </div>
                </div>
            `
        });
        // --- 修改/新增結束 ---

        app.mount('#app');
    </script>

</body>
</html>
