<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡資訊卡片 - Vue 元件</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 全局樣式設定 */
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* CSS 變數 */
        :root {
            --card-width: 1400px;
            --card-height: 552px; /* 根據你的更新調整高度 */
            --card-border-radius: 56px;
            --image-width: 600px;
            --info-padding-y: 44px;
            --info-padding-x: 73px;
            --title-margin-bottom: 24px;
            --details-margin-bottom: 24px; /* 新增的間距 */
            --icon-size: 50px;
            --icon-color: #B0B6BC;
            --icon-gap: 24px;
            --font-color-black: #2C3E50;
            --color-orange-500: #FC8458;
            --color-white-base: #FDFDFD;
            --font-size-h3: 30px;
            --font-size-p: 22px;
            --font-weight-bold: 700;
            --font-weight-normal: 400;
        }

        /* 卡片主要容器 */
        .contact-card {
            width: var(--card-width);
            height: var(--card-height);
            border-radius: var(--card-border-radius);
            background-color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
        }

        /* 左側圖片 */
        .contact-card .card-img-left {
            width: var(--image-width);
            height: var(--card-height);
            object-fit: cover;
            flex-shrink: 0;
            display: block;
            /* --- 修改/新增開始 --- */
            transition: opacity 0.3s ease; /* 為滑鼠懸停效果增加過渡 */
            /* --- 修改/新增結束 --- */
        }
        
        /* 右側資訊區塊 */
        .contact-card .card-info {
            flex-grow: 1;
            padding: var(--info-padding-y) var(--info-padding-x);
            display: flex;
            flex-direction: column;
            color: var(--font-color-black);
        }
        
        /* --- 修改/新增開始 --- */
        /* 統一所有連結的樣式 */
        .contact-card a {
            text-decoration: none;
            color: inherit;
        }

        /* 圖片連結的滑鼠懸停效果 */
        .contact-card > a:hover .card-img-left {
            opacity: 0.9; /* 讓圖片稍微變暗，提示可點擊 */
        }

        /* 資訊區塊內的文字連結滑鼠懸停效果 */
        .contact-card .card-info a:hover {
            color: var(--color-orange-500); /* 改為主題橘色 */
            text-decoration: underline; /* 加上底線以提示互動 */
        }
        
        /* 社群圖示的滑鼠懸停效果 */
        .contact-card .icon-block .social-icon:hover {
            color: var(--color-orange-500) !important; /* 使用 !important 確保覆蓋，並統一為主題橘色 */
        }
        /* --- 修改/新增結束 --- */

        /* 分類標籤 */
        .contact-card .categories {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .category-button {
            background-color: var(--color-orange-500);
            color: var(--color-white-base);
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-normal);
            padding: 8px 18px;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        .category-button:hover {
            opacity: 0.9;
        }
        
        /* 標題 */
        .contact-card .card-title {
            font-size: var(--font-size-h3);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--title-margin-bottom);
        }

        /* 活動詳細資訊 */
        .contact-card .card-event-details {
            width: 368px;
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-normal);
            margin-bottom: var(--details-margin-bottom);
            color: var(--font-color-black);
            line-height: 1.5;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        /* 內文項目 */
        .contact-card .card-text-item {
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-normal);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }

        .contact-card .card-text-item i {
            margin-right: 1rem;
        }

        /* 圖標區塊 */
        .contact-card .icon-block {
            margin-top: auto;
            display: flex;
            gap: var(--icon-gap);
        }

        .contact-card .icon-block .social-icon {
            font-size: var(--icon-size);
            color: var(--icon-color);
            transition: color 0.3s ease;
        }

    </style>
</head>
<body>
    <div id="app">
        <contact-card :card-data="contactInfo"></contact-card>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script type="text/x-template" id="category-button-template">
        <button type="button" class="category-button">{{ text }}</button>
    </script>

    <script type="text/x-template" id="contact-card-template">
        <div class="contact-card">
            <a :href="cardData.websiteUrl" target="_blank" rel="noopener noreferrer">
                <img :src="cardData.imageUrl" class="card-img-left" alt="聯絡單位圖片">
            </a>
            
            <div class="card-info">
                <div class="categories">
                    <category-button v-for="cat in cardData.categories" :key="cat" :text="cat"></category-button>
                </div>

                <div>
                    <h3 class="card-title">
                        <a :href="cardData.websiteUrl" target="_blank" rel="noopener noreferrer">{{ cardData.title }}</a>
                    </h3>
                    <p class="card-event-details" v-if="cardData.eventDetails">{{ cardData.eventDetails }}</p>
                    
                    <p class="card-text-item">
                        <i class="bi bi-telephone-fill"></i>
                        <a :href="telLink"><span>電話：{{ cardData.phone }}</span></a>
                    </p>
                    <p class="card-text-item">
                        <i class="bi bi-envelope-fill"></i>
                        <a :href="mailtoLink"><span>信箱：{{ cardData.email }}</span></a>
                    </p>
                    <p class="card-text-item">
                        <i class="bi bi-geo-alt-fill"></i>
                        <a :href="mapLink" target="_blank" rel="noopener noreferrer"><span>地址：{{ cardData.address }}</span></a>
                    </p>
                    </div>

                <div class="icon-block">
                    <a href="#" v-for="icon in cardData.socialIcons" :key="icon" :class="[icon, 'social-icon']"></a>
                </div>
            </div>
        </div>
    </script>

    <script>
        const { createApp, ref, computed } = Vue;

        const app = createApp({
            setup() {
                const contactInfo = ref({
                    imageUrl: 'https://placehold.co/600x552/E9E9E9/808080?text=Image',
                    websiteUrl: 'https://www.sport.taichung.gov.tw/',
                    categories: ['青少年服務', '運動與休閒'],
                    title: '臺中市政府運動局',
                    eventDetails: '活動名稱：打工陷阱別亂闖，手機代刷付款父母賠償！',
                    phone: '(04)2228-9111#51400',
                    email: '54hsiaowantzu@taichung.gov.tw',
                    address: '台中市北區力行路271號',
                    socialIcons: ['bi-facebook', 'bi-instagram', 'bi-youtube']
                });
                return { contactInfo };
            }
        });

        app.component('category-button', {
            template: '#category-button-template',
            props: { text: String }
        });

        // --- 修改/新增開始 ---
        // 註冊主要的聯絡資訊卡片元件 (恢復使用 computed 的最佳實踐)
        app.component('contact-card', {
            template: '#contact-card-template',
            props: {
                cardData: Object
            },
            setup(props) {
                // 1. 電話連結
                const telLink = computed(() => {
                    const cleanPhone = props.cardData.phone.replace(/[^\d#]/g, '').replace('#', ',');
                    return `tel:${cleanPhone}`;
                });
                // 2. 信箱連結
                const mailtoLink = computed(() => `mailto:${props.cardData.email}`);
                // 3. 地圖連結
                const mapLink = computed(() => {
                    const encodedAddress = encodeURIComponent(props.cardData.address);
                    return `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
                });
                // 回傳給模板使用
                return { telLink, mailtoLink, mapLink };
            }
        });
        // --- 修改/新增結束 ---

        app.mount('#app');
    </script>
</body>
</html>
