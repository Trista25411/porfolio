<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>按鈕元件預覽 (含邊框)</title>
  <style>
    /* 頁面基本樣式，用於將按鈕置中方便預覽 */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px; /* 按鈕間的距離 */
      min-height: 100vh;
      margin: 0;
      background-color: #f0f2f5; /* 淺灰色背景以突顯按鈕 */
      font-family: sans-serif;
    }

    .custom-teen-button {
      /* --- 基本樣式與尺寸設定 --- */
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 68px;
      padding: 16px 22px;
      box-sizing: border-box; 
      border-radius: 73px;
      
      /* --- 【本次更新】新增的邊框樣式 --- */
      border: 2px solid #B0B6BC;
      
      cursor: pointer;

      /* --- 字體設定 (對應 JSON 規範) --- */
      font-family: 'Gen Jyuu Gothic X', sans-serif; 
      font-size: 24px;
      font-weight: 700;

      /* --- 預設狀態顏色 (圖一) --- */
      background-color: #FDFDFD;
      color: #2C3E50;

      /* --- 【本次更新】過渡動畫設定，加入了 border-color --- */
      transition: background-color 200ms cubic-bezier(0, 0, 0.58, 1),
                  color 200ms cubic-bezier(0, 0, 0.58, 1),
                  border-color 200ms cubic-bezier(0, 0, 0.58, 1);
    }

    .custom-teen-button:hover {
      background-color: #16B4D6;
      color: #FDFDFD;
      
      /* --- 【本次更新】Hover 時將邊框顏色與背景色同步，達到視覺上隱藏的效果 --- */
      border-color: #16B4D6;
    }
  </style>
</head>
<body>

  <button class="custom-teen-button">青少年</button>

  <button class="custom-teen-button">兒童</button>

</body>
</html>
