<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 互動卡片元件</title>
    
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- 引入 Google Fonts - Gen Jyuu Gothic X -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 根據 JSON 規範定義 CSS 變數 */
        :root {
            /* 色彩規範 */
            --color-white-base: #FDFDFD;
            --color-blue-500: #16B4D6;
            
            /* 字體色彩規範 */
            --font-color-black: #2C3E50;
            --font-color-white: #FDFDFD;

            /* 字體大小規範 */
            --font-size-h4: 24px;

            /* 字體家族規範 */
            --font-family-sans: 'Noto Sans TC', 'Gen Jyuu Gothic X', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: var(--font-family-sans);
        }

        /* 元件主要樣式 */
        .interactive-card {
            /* (a) 元件整體大小 */
            width: 264px;
            height: 265px;
            border-radius: 48px;

            /* (c) 內容在整體內距 */
            padding: 35px 32px;
            
            /* 使用 Bootstrap Flexbox 來置中內容 */
            display: flex;
            flex-direction: column;
            align-items: center;
            
            /* 初始背景顏色 */
            background-color: var(--color-white-base);
            
            /* 4. 過渡效果設定 */
            transition: background-color 200ms cubic-bezier(0, 0, 0.58, 1);
            
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .interactive-card .card-icon {
            /* (b-1) img 大小 */
            width: 135px;
            height: 135px;
            border-radius: 25px;
            
            /* 初始圖示背景 */
            background-color: #D9D9D9; /* 預設的灰色 */
            
            /* 過渡效果設定 */
            transition: background-color 200ms cubic-bezier(0, 0, 0.58, 1);
        }

        .interactive-card .card-title {
            /* (b-2) 標題字: h4 */
            font-size: var(--font-size-h4);
            font-weight: bold;
            color: var(--font-color-black);
            
            /* (b-2) 上下間距 */
            margin-top: 24px;
            
            /* 4. 過渡效果設定 */
            transition: color 200ms cubic-bezier(0, 0, 0.58, 1);
        }

        /* Hover 狀態 */
        .interactive-card:hover {
            background-color: var(--color-blue-500);
        }

        .interactive-card:hover .card-icon {
            /* Hover 時圖示背景變為白色 */
            background-color: var(--color-white-base);
        }

        .interactive-card:hover .card-title {
            color: var(--font-color-white);
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- 
          Vue 元件實例
          @mouseover 和 @mouseleave 用於觸發 hover 狀態的改變
        -->
        <div class="interactive-card">
            <div class="card-icon">
                <!-- 這裡可以替換成真實的 <img> 或 SVG 圖標 -->
                <!-- 圖片嵌入位置 (已編輯) -->
            </div>
            <!-- 文字更改位置 (已編輯) -->
            <h4 class="card-title">{{ title }}</h4>
        </div>
    </div>

    <!-- 引入 Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                // 定義元件的標題文字
                const title = ref('休閒娛樂');

                return {
                    title
                };
            }
        }).mount('#app');
    </script>

</body>
</html>
