<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer 元件預覽 (優化版)</title>

    <!-- 1. 引入 Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- 2. 引入 Bootstrap Icons 1.11.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- 3. 引入思源黑體 (作為 'Gen Jyuu Gothic X' 的替代方案) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* --- 全域樣式與 Sticky Footer 設定 --- */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background-color: #f0f2f5;
        }

        /* 使用 Flexbox 實現 "Sticky Footer" */
        /* 這能確保 Footer 總是在頁面內容的最底部 */
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* 容器高度至少為視窗高度 */
        }

        main {
            flex-grow: 1; /* 主要內容區塊會填滿所有剩餘空間，將 footer 推向底部 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .placeholder-content {
            text-align: center;
            color: #6c757d;
        }

        /* --- Vue 元件樣式 --- */
        :root {
            --color-blue-500: #16B4D6;
            --color-white-base: #FDFDFD;
            --font-family-sans: 'Noto Sans TC', 'Gen Jyuu Gothic X', sans-serif;
            --font-size-h4: 24px;
            --font-size-p: 22px;
            --font-size-small: 14px;
            --font-weight-bold: 700;
            --font-text-color: #FDFDFD;
            --spacing-4: 1rem;
        }

        .custom-footer {
            position: relative;
            width: 100%;
            color: var(--font-text-color);
            font-family: var(--font-family-sans);
            line-height: 1.2;
            margin-top: auto;
        }

        .wave-container {
            position: absolute;
            bottom: 100%;
            left: 0;
            width: 100%;
            line-height: 0;
        }

        .wave {
            display: block;
            width: 100%;
            height: 200px; /* 根據 SVG 調整高度 */
        }

        .wave-fill {
            fill: var(--color-blue-500);
        }

        /* 主要內容區塊 */
        .footer-content {
            background-color: var(--color-blue-500);
            padding-top: 3rem;
            padding-bottom: 4rem;
            padding-left: var(--spacing-4);
            padding-right: var(--spacing-4);
        }

        .footer-title {
            font-size: var(--font-size-h4);
            font-weight: var(--font-weight-bold);
            margin-bottom: 1.5rem;
        }

        .footer-list li {
            font-size: var(--font-size-p);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }

        .footer-list li:last-child {
            margin-bottom: 0;
        }

        .browser-icons i {
            font-size: 32px;
            margin-right: var(--spacing-4);
        }
        
        .gy-5 {
            --bs-gutter-y: 3rem;
        }

        @media (max-width: 991.98px) {
            .footer-content {
                padding-top: 2rem;
                padding-bottom: 3rem;
            }
            .row {
                align-items: flex-start !important;
            }
            .footer-title {
                margin-top: 1.5rem;
            }
            .footer-list li {
                font-size: 18px;
            }
            /* 在手機上，讓瀏覽器圖示不要有右邊距 */
            .browser-icons.text-lg-end {
                text-align: left !important;
            }
            .browser-icons i {
                margin-right: 1rem;
            }
        }
    </style>
</head>
<body>

    <div id="app">
        <main>
            <div class="placeholder-content">
                <h1>這裡是頁面主要內容</h1>
                <p>不論內容多寡，Footer 都會固定在頁面底部。</p>
                <div style="height: 1500px; border: 1px dashed #ccc; margin-top: 2rem;">
                    <p style="padding: 1rem;">(這是一個很長的區塊，用來模擬滾動)</p>
                </div>
            </div>
        </main>
        
        <custom-footer></custom-footer>
    </div>

    <!-- 引入 Vue.js 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script>
        const app = Vue.createApp({});

        app.component('custom-footer', {
            template: `
                <footer class="custom-footer">
                    <div class="wave-container">
                        <!-- SVG path d 屬性已優化 -->
                        <svg class="wave" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 200" preserveAspectRatio="none">
                            <path d="M0 13.72C0 3.64 9.46 7.54 117.85.98C226.23-5.58 400.73 21.33 553.5 61.46C706.26 101.6 841.02 132.09 993.78 118.71C1146.55 105.33 1259.49 55.61 1488.02 58.87C1716.55 62.12 1845.81 123.69 1920 179.17V200H0Z" class="wave-fill"></path>
                        </svg>
                    </div>

                    <div class="footer-content">
                        <div class="container">
                            <!-- 
                                1. text-start 讓所有內容預設靠左
                                2. align-items-end 讓內容在桌面版時與底部對齊
                            -->
                            <div class="row align-items-end text-start gy-5">
                                <div class="col-12 col-lg-5">
                                    <h4 class="footer-title">少年英雄聯盟</h4>
                                    <ul class="list-unstyled footer-list">
                                        <li><i class="bi bi-calendar-check me-2"></i>政府行政機關辦公日曆表</li>
                                        <li><i class="bi bi-clock me-2"></i>辦公時間：08:00-17:00</li>
                                        <li><i class="bi bi-clock-history me-2"></i>中午休息：12:00-13:00</li>
                                    </ul>
                                </div>
                                <div class="col-12 col-md-6 col-lg-4">
                                    <h4 class="footer-title">網站資訊</h4>
                                    <ul class="list-unstyled footer-list">
                                        <li><i class="bi bi-people me-2"></i>瀏覽人次：115,279</li>
                                        <li><i class="bi bi-arrow-clockwise me-2"></i>更新日期：{{ currentUpdateDate }}</li>
                                    </ul>
                                </div>
                                <!-- 
                                    使用 text-lg-end 讓此區塊只在桌面版(lg)以上時靠右對齊 
                                    在手機上會維持預設的靠左對齊
                                -->
                                <div class="col-12 col-md-6 col-lg-3 text-lg-end">
                                    <h4 class="footer-title">建議使用以下瀏覽器</h4>
                                    <div class="browser-icons">
                                        <i class="bi bi-google-chrome"></i>
                                        <i class="bi bi-firefox"></i>
                                        <i class="bi bi-browser-edge"></i>
                                        <i class="bi bi-browser-safari"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </footer>
            `,
            data() {
                return {
                    currentUpdateDate: '2025.07.29'
                }
            }
        });

        app.mount('#app');
    </script>

</body>
</html>
