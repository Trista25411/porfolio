<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聯絡資訊卡片 - Vue 元件</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* 全局樣式設定 */
        body {
            font-family: 'Noto Sans TC', 'Gen Jyuu Gothic X', sans-serif;
            background-color: #f0f2f5; /* 給予一個背景色方便預覽 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* 根據 JSON 規範和設計稿定義的變數 */
        :root {
            --card-width: 1400px;
            --card-height: 444px;
            --card-border-radius: 56px;
            --image-width: 600px;
            --info-padding-y: 44px;
            --info-padding-x: 73px;
            --title-margin-bottom: 24px;
            --icon-size: 50px;
            --icon-color: #B0B6BC;
            --icon-gap: 24px;
            --font-color-black: #2C3E50;
            --color-orange-500: #FC8458;
            --color-white-base: #FDFDFD;
            --font-size-h3: 30px;
            --font-size-p: 22px;
            --font-weight-bold: 700;
            --font-weight-normal: 400;
        }

        /* 卡片主要容器樣式 */
        .contact-card {
            width: var(--card-width);
            height: var(--card-height);
            border-radius: var(--card-border-radius);
            background-color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* 確保子元素的圓角正確顯示 */
            display: flex;
        }

        /* 左側圖片區塊 */
        .contact-card .card-img-left {
            width: var(--image-width);
            height: var(--card-height);
            object-fit: cover; /* 確保圖片填滿容器且不變形 */
            flex-shrink: 0; /* 防止圖片被壓縮 */
        }

        /* 右側資訊區塊 */
        .contact-card .card-info {
            flex-grow: 1;
            padding: var(--info-padding-y) var(--info-padding-x);
            display: flex;
            flex-direction: column;
            color: var(--font-color-black);
        }

        /* 分類標籤容器 */
        .contact-card .categories {
            display: flex;
            gap: 1rem; /* 使用 gap 來設定標籤間距 */
            margin-bottom: 1.5rem; /* 根據視覺稿調整與標題的距離 */
        }
        
        /* * =================================================
         * 活動卡片分類元件樣式 (完全遵循規範檔案)
         * =================================================
        */
        .category-button {
            background-color: var(--color-orange-500);
            color: var(--color-white-base);
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-normal);
            padding: 8px 18px; /* (b)(2) 距離邊框: 左右為18px, 上下為8px */
            border-radius: 18px; /* (a) border-radius: 18px */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none; /* 移除按鈕預設邊框 */
            transition: opacity 0.3s ease;
            white-space: nowrap; /* 防止文字換行 */
        }

        .category-button:hover {
            opacity: 0.9;
            color: var(--color-white-base);
        }
        
        /* 標題樣式 */
        .contact-card .card-title {
            font-size: var(--font-size-h3);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--title-margin-bottom);
        }

        /* 內文樣式 */
        .contact-card .card-text-item {
            font-size: var(--font-size-p);
            font-weight: var(--font-weight-normal);
            margin-bottom: 1rem; /* 調整聯絡資訊的行距 */
            display: flex;
            align-items: center;
        }

        .contact-card .card-text-item i {
            margin-right: 1rem; /* 圖標與文字的距離 */
        }

        /* 圖標區塊 */
        .contact-card .icon-block {
            margin-top: auto; /* 將圖標區塊推至底部 */
            display: flex;
            gap: var(--icon-gap);
        }

        .contact-card .icon-block .social-icon {
            font-size: var(--icon-size);
            color: var(--icon-color);
            transition: color 0.3s ease;
        }
        .contact-card .icon-block .social-icon:hover {
            color: #333; /* 滑鼠懸停時變色 */
        }

        /* --- 修改/新增開始 --- */
        /* 資訊區塊內的連結樣式 */
        .card-info a {
            color: inherit; /* 繼承父層的文字顏色 */
            text-decoration: none; /* 移除底線 */
            transition: color 0.3s ease;
        }

        /* 滑鼠懸停在連結上時的樣式 */
        .card-info a:hover {
            color: var(--color-orange-500); /* 變成主題橘色 */
            text-decoration: underline; /* 加上底線以提示可點擊 */
        }
        /* --- 修改/新增結束 --- */

    </style>
</head>
<body>

    <div id="app">
        <contact-card :card-data="contactInfo"></contact-card>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <script type="text/x-template" id="category-button-template">
        <button type="button" class="category-button">
            {{ text }}
        </button>
    </script>

    <script type="text/x-template" id="contact-card-template">
        <div class="contact-card">
            <img :src="cardData.imageUrl" class="card-img-left" alt="聯絡單位圖片">
            
            <div class="card-info">
                <div class="categories">
                    <category-button v-for="cat in cardData.categories" :key="cat" :text="cat"></category-button>
                </div>

                <div>
                    <h3 class="card-title">
                        <a :href="cardData.website" target="_blank" rel="noopener noreferrer">
                            {{ cardData.title }}
                        </a>
                    </h3>
                    <p class="card-text-item">
                        <i class="bi bi-telephone-fill"></i>
                        <a :href="telLink">
                            <span>電話：{{ cardData.phone }}</span>
                        </a>
                    </p>
                    <p class="card-text-item">
                        <i class="bi bi-envelope-fill"></i>
                        <a :href="mailtoLink">
                            <span>信箱：{{ cardData.email }}</span>
                        </a>
                    </p>
                    <p class="card-text-item">
                        <i class="bi bi-geo-alt-fill"></i>
                        <a :href="mapLink" target="_blank" rel="noopener noreferrer">
                            <span>地址：{{ cardData.address }}</span>
                        </a>
                    </p>
                    </div>

                <div class="icon-block">
                    <a href="#" v-for="icon in cardData.socialIcons" :key="icon" :class="icon" class="social-icon"></a>
                </div>
            </div>
        </div>
    </script>

    <script>
        const { createApp, ref, computed } = Vue; // 從 Vue 中引入 computed

        const app = createApp({
            setup() {
                // 將卡片資料定義在 setup 中，方便管理
                const contactInfo = ref({
                    imageUrl: 'https://placehold.co/600x444/E9E9E9/808080?text=Image', // 請替換成您的圖片路徑
                    // --- 修改/新增開始 ---
                    website: 'https://www.sport.taichung.gov.tw/', // 新增網站連結
                    // --- 修改/新增結束 ---
                    categories: ['青少年服務', '運動與休閒'],
                    title: '臺中市政府運動局',
                    phone: '(04)2228-9111#51400',
                    email: '54hsiaowantzu@taichung.gov.tw',
                    address: '台中市南屯區北屯區北屯路94號',
                    socialIcons: ['bi-facebook', 'bi-instagram', 'bi-youtube']
                });

                return {
                    contactInfo
                };
            }
        });

        // 註冊活動卡片分類元件
        app.component('category-button', {
            template: '#category-button-template',
            props: {
                text: String,
            }
        });

        // 註冊主要的聯絡資訊卡片元件
        // --- 修改/新增開始 ---
        app.component('contact-card', {
            template: '#contact-card-template',
            props: {
                cardData: Object
            },
            setup(props) {
                // 使用 computed 來產生格式化的連結
                // 1. 產生電話連結 (tel:)
                const telLink = computed(() => {
                    // 移除電話中的非數字部分(除了分機#)，並將 # 換成 , (pause)
                    const cleanPhone = props.cardData.phone.replace(/[^\d#]/g, '').replace('#', ',');
                    return `tel:${cleanPhone}`;
                });

                // 2. 產生信箱連結 (mailto:)
                const mailtoLink = computed(() => `mailto:${props.cardData.email}`);

                // 3. 產生 Google Map 連結
                const mapLink = computed(() => {
                    const encodedAddress = encodeURIComponent(props.cardData.address);
                    return `https://www.google.com/maps/search/?api=1&query=${encodedAddress}`;
                });

                // 將這些計算屬性回傳給模板使用
                return {
                    telLink,
                    mailtoLink,
                    mapLink
                };
            }
        });
        // --- 修改/新增結束 ---

        app.mount('#app');
    </script>

</body>
</html>
